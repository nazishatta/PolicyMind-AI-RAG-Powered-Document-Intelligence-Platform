name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# All jobs run offline: mock LLM, in-memory vector store, in-memory graph.
# No API keys, no external services, no large dataset downloads required.
env:
  LLM_PROVIDER: mock
  VECTOR_STORE_PROVIDER: memory
  GRAPH_PROVIDER: memory
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  # ── Job 1: Lint and type check ─────────────────────────────────────────────
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check app/ src/

      - name: Mypy — type check
        run: mypy app/ src/ --ignore-missing-imports

  # ── Job 2: Unit tests across Python versions ───────────────────────────────
  unit-tests:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # report failures on all versions, not just the first
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest backend/tests/ \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Job 3: End-to-end smoke test in mock mode ──────────────────────────────
  #
  # Starts the real FastAPI server (mock provider, in-memory stores) and runs
  # scripts/smoke_test.py against it. Exercises the full HTTP stack — ingestion,
  # retrieval, trust-layer fields, graph endpoints, and input validation — with
  # no API keys or external services.
  #
  # The sentence-transformers model (~90 MB) is cached after the first run so
  # subsequent smoke tests complete without re-downloading.
  smoke:
    name: Smoke test (mock mode)
    runs-on: ubuntu-latest
    needs: lint               # only run if lint passes; avoids confusing server-startup errors

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-all-MiniLM-L6-v2-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-hf-all-MiniLM-L6-v2-

      - name: Start server and run smoke test
        run: |
          # Start the server in the background with all offline providers
          uvicorn backend.app.main:app --port 8000 --log-level warning &
          SERVER_PID=$!

          # Poll the health endpoint — give the server up to 60 s to start
          # (first run may take longer due to model download)
          echo "Waiting for server to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Server did not become ready within 60s"
              kill "$SERVER_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Run the smoke test and capture its exit code
          python scripts/smoke_test.py --base-url http://localhost:8000
          SMOKE_EXIT=$?

          kill "$SERVER_PID" 2>/dev/null || true
          exit $SMOKE_EXIT
